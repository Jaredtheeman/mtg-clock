<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a16">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Spectral:wght@500;700&display=swap" rel="stylesheet">
  <title>MTG Life &amp; Clock</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    :root {
      --p1-bg:  #140b2a;
      --p2-bg:  #0b1a2e;
      --mid-bg: #05050d;
      --gold:   #d4af37;
      --red:    #e94560;
      --blue:   #2f7ad1;
      --text:   #f0f0f0;
      --muted:  rgba(255,255,255,0.40);
      --font-disp: 'Cinzel', Georgia, 'Times New Roman', serif;
      --font-ui:   'Spectral', 'Iowan Old Style', Georgia, system-ui, serif;
      --font-mono: ui-monospace, 'SF Mono', 'Consolas', 'Roboto Mono', monospace;
    }
    html, body { height: 100%; overflow: hidden; background: #000; }
    body {
      display: flex; flex-direction: column;
      height: 100dvh;
      color: var(--text);
      font-family: var(--font-ui);
    }

    /* ── Zones (top/bottom strips, landscape) ───────── */
    .zone {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden;
      background: #000;                          /* inactive = black */
      transition: background 0.45s ease, box-shadow 0.45s ease;
      position: relative;
    }
    #zone-p2 { transform: rotate(180deg); }
    /* Active (priority) player lights up in their colour */
    #zone-p1.active {
      background: radial-gradient(ellipse at 50% 60%, #2a1552 0%, #0d0720 78%);
      box-shadow: inset 0 0 90px rgba(120,70,220,0.18);
    }
    #zone-p2.active {
      background: radial-gradient(ellipse at 50% 60%, #103154 0%, #06121f 78%);
      box-shadow: inset 0 0 90px rgba(60,140,220,0.18);
    }
    .zone.dead { background: rgba(50,0,0,0.6) !important; box-shadow: none !important; }

    /* Inner row: [−] [center] [+] */
    .zone-inner {
      flex: 1; min-height: 0;
      display: flex; flex-direction: row; align-items: stretch;
    }
    .adj {
      flex: 0 0 22%; max-width: 200px;
      background: transparent; border: none; color: var(--text);
      font-size: clamp(30px, 8vh, 52px); font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }
    .adj:first-child { border-right: 1px solid rgba(255,255,255,0.12); }
    .adj:last-child  { border-left:  1px solid rgba(255,255,255,0.12); }
    .adj:active { background: rgba(255,255,255,0.12); }

    .zone-center {
      flex: 1; min-width: 0; position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; padding: 2px 4px;
    }
    .turn-count {
      position: absolute; top: 4px; left: 8px;
      font-family: var(--font-disp);
      font-size: clamp(10px, 2.2vh, 14px); font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--gold); opacity: 0.65; pointer-events: none;
    }

    /* Life delta popup */
    .life-num-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .life-popup {
      position: absolute; bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,22,0.9);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 5px; padding: 2px 12px;
      font-size: clamp(14px, 3.4vh, 22px); font-weight: 900; letter-spacing: 1px;
      pointer-events: none; z-index: 20; opacity: 0;
      transition: opacity 0.25s; white-space: nowrap;
    }
    .life-popup.show { opacity: 1; }

    .life-num {
      font-family: var(--font-disp);
      font-size: clamp(44px, 15vh, 86px); font-weight: 900; line-height: 1;
      color: #fff; text-shadow: 0 0 24px rgba(255,255,255,0.20);
      font-variant-numeric: tabular-nums; overflow: visible;
    }
    .life-num.shake      { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97); }
    .life-num.shake.dmg  { color: #ff5b5b; text-shadow: 0 0 26px rgba(255,60,60,0.6); }
    .life-num.shake.heal { color: #5bff9a; text-shadow: 0 0 26px rgba(60,255,140,0.6); }
    @keyframes shake {
      0%,100% { transform: translateX(0) scale(1); }
      15%     { transform: translateX(-7px) scale(1.12); }
      30%     { transform: translateX(6px)  scale(1.12); }
      45%     { transform: translateX(-5px) scale(1.06); }
      60%     { transform: translateX(4px); }
      80%     { transform: translateX(-2px); }
    }

    .clock {
      font-family: var(--font-mono);
      font-size: clamp(13px, 3.2vh, 22px); font-weight: 600; letter-spacing: 2px;
      color: var(--muted); font-variant-numeric: tabular-nums;
      padding: 1px 9px; border-radius: 6px; transition: color 0.25s;
    }
    .zone.active .clock { color: #3dff8f; }
    /* Time-pressure escalation (active running clock only) */
    .clock.breathing { animation: breathe 7s ease-in-out infinite; }
    .clock.warn      { color: #ff4040 !important; font-weight: 800; }
    .clock.critical  { color: #ff2020 !important; font-weight: 800; animation: clockBlink 0.75s ease-in-out infinite; }
    .clock.flash     { animation: clockFlash 0.6s ease; }
    @keyframes breathe {
      0%,100% { opacity: 1;    color: #e2fff0; }
      50%     { opacity: 0.62; color: #8b97a3; }
    }
    @keyframes clockBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.1; } }
    @keyframes clockFlash {
      0%   { background: rgba(233,69,96,0); }
      35%  { background: rgba(233,69,96,0.6); }
      100% { background: rgba(233,69,96,0); }
    }
    .clock.expired {
      font-size: clamp(10px, 2.4vh, 15px) !important;
      letter-spacing: 1px; color: var(--red) !important;
      animation: clockBlink 0.75s ease-in-out infinite;
    }

    /* ── Priority button row: [Pass] [Cast] [F6] ─────── */
    .btn-row {
      display: flex; align-items: stretch; flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      height: clamp(42px, 9vh, 58px);
    }
    .pass-btn {
      flex: 1;
      background: linear-gradient(135deg, #e94560, #b52a40);
      border: none; color: white;
      font-size: clamp(11px, 2.2vh, 15px);
      font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      transition: filter 0.12s;
    }
    .pass-btn.start { background: linear-gradient(135deg, #2bb673, #1c8a55); }
    .pass-btn:not(.waiting):active { filter: brightness(1.25); }
    .pass-btn.waiting {
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.22);
      box-shadow: none; pointer-events: none;
    }
    .cast-btn {
      flex: 0 0 30%; max-width: 200px;
      background: linear-gradient(135deg, #3a86d4, #245fa0);
      border: none; border-left: 1px solid rgba(255,255,255,0.12);
      color: white; font-size: clamp(11px, 2.2vh, 15px);
      font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      transition: filter 0.12s;
    }
    .cast-btn:not(.waiting):active { filter: brightness(1.25); }
    .cast-btn.waiting {
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.22);
      box-shadow: none; pointer-events: none;
    }
    .f6-btn {
      flex: 0 0 52px;
      background: rgba(255,255,255,0.05);
      border: none; border-left: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.45);
      font-size: 14px; font-weight: 900; letter-spacing: 1px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .f6-btn:active { background: rgba(255,255,255,0.14); }
    .f6-btn.on { color: var(--gold); background: rgba(212,175,55,0.12); border-left-color: rgba(212,175,55,0.3); }
    .hidden { display: none !important; }
    /* Themed serif font on all action buttons (was falling back to UA sans-serif) */
    .adj, .pass-btn, .cast-btn, .f6-btn, .combat-y, .combat-n,
    .phase-seg, .ctrl-btn, .stack-ind, .chip {
      font-family: var(--font-disp);
    }

    /* ── Middle ribbon: phase track + controls ───────── */
    .mid {
      flex: 0 0 auto; background: var(--mid-bg);
      display: flex; flex-direction: row; align-items: center; gap: 8px;
      padding: 5px 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transform-origin: center;
      transition: opacity 0.15s ease;
    }
    .mid.flip { transform: rotate(180deg); }   /* face whoever's turn it is (snaps while faded out) */
    .phase-track {
      position: relative;
      flex: 1; display: flex; align-items: stretch;
      background: #100d1a;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px; overflow: hidden;
    }
    /* The gold highlight that slides between phases */
    .phase-slider {
      position: absolute; top: 0; bottom: 0; left: 0; width: 0;
      background: var(--gold); z-index: 0; pointer-events: none;
      box-shadow: inset 0 0 16px rgba(255,255,255,0.22);
      transition: left 0.2s cubic-bezier(.4,0,.2,1), width 0.2s cubic-bezier(.4,0,.2,1);
    }
    .phase-seg {
      position: relative; z-index: 1;
      flex: 1 1 0; min-width: 0;
      background: transparent; border: none;
      border-right: 1px solid rgba(255,255,255,0.08);   /* tile divider */
      color: var(--muted);
      font-size: clamp(9px, 1.9vh, 12px); font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      padding: 7px 4px; cursor: pointer; white-space: nowrap;
      text-overflow: ellipsis; overflow: hidden;
      transition: color 0.18s ease;
    }
    .phase-seg:last-child { border-right: none; }
    .phase-seg.done { color: rgba(255,255,255,0.26); }
    .phase-seg.on   { color: #1a1205; }                 /* dark text over the gold slider */
    .phase-seg:active { background: rgba(255,255,255,0.05); }

    .mid-ctrls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .stack-ind {
      display: none; align-items: center; gap: 3px;
      font-size: 12px; font-weight: 800; color: var(--blue);
      background: rgba(47,122,209,0.14); border: 1px solid rgba(47,122,209,0.4);
      border-radius: 6px; padding: 5px 9px; white-space: nowrap;
    }
    .stack-ind.show { display: inline-flex; }
    .ctrl-btn {
      flex: 0 0 34px; height: 34px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6); border-radius: 7px;
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.2); }
    #pause-btn.paused { color: #3dff8f; border-color: rgba(61,255,143,0.35); }

    /* ── Overlays ────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); z-index: 100;
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }
    #combat-ov.flip .modal { transform: rotate(180deg); }   /* combat box faces the turn player */
    .modal {
      background: linear-gradient(160deg, #161020 0%, #09060f 100%);
      border: 1px solid rgba(212,175,55,0.28);
      border-radius: 18px; padding: 18px 22px 16px;
      width: 100%; max-width: 480px; max-height: 96vh; overflow-y: auto;
      box-shadow: 0 18px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .modal-title {
      font-family: var(--font-disp); font-size: 21px; font-weight: 900;
      color: var(--gold); text-align: center; letter-spacing: 2px;
      padding-bottom: 11px; margin-bottom: 14px;
      border-bottom: 1px solid rgba(212,175,55,0.22);
      text-shadow: 0 0 18px rgba(212,175,55,0.35);
    }
    .grp { margin-bottom: 14px; }
    .grp-lbl {
      font-family: var(--font-disp); font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px; text-align: center;
      color: var(--gold); opacity: 0.82; margin-bottom: 10px;
    }
    .chips {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: rgba(255,255,255,0.12);          /* shows as 1px grid lines */
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; overflow: hidden;
    }
    .chip {
      background: #1b1526; border: none; color: var(--text);
      padding: 12px 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .chip.wide { grid-column: 1 / -1; }            /* Custom spans the full row */
    .chip:active { filter: brightness(1.3); }
    .chip.on {
      background: var(--gold); color: #1a1205;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.25);
    }
    .custom-inp {
      width: 100%; background: rgba(0,0,0,0.35);
      border: 1px solid rgba(212,175,55,0.3); color: var(--text);
      padding: 11px 14px; border-radius: 8px; font-size: 16px;
      font-family: var(--font-ui);
      margin-top: 10px; display: none;
    }
    .custom-inp:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(212,175,55,0.2); }
    .row2 { display: flex; gap: 12px; }
    .row2 > * { flex: 1; }
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #e6c14e, #b8902a);
      border: none; color: #1a1205;
      font-family: var(--font-disp); font-size: 15px; font-weight: 900;
      border-radius: 10px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 1.5px; margin-top: 6px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .btn-primary:active { filter: brightness(1.1); }
    .btn-ghost {
      width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted); font-size: 14px; font-weight: 600;
      font-family: var(--font-ui);
      border-radius: 10px; cursor: pointer; margin-top: 9px;
    }
    .btn-ghost:active { background: rgba(255,255,255,0.1); }
    .combat-row { display: flex; align-items: stretch; gap: 14px; min-height: 96px; }
    .combat-mid {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px; text-align: center;
    }
    .combat-title { font-family: var(--font-disp); font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
    .combat-q     { color: var(--muted); font-size: 13px; line-height: 1.4; }
    .combat-y, .combat-n {
      flex: 0 0 80px; border: none; border-radius: 14px;
      font-size: 22px; font-weight: 900; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .combat-y { background: linear-gradient(135deg, #2bb673, #1c8a55); color: white; }
    .combat-n { background: linear-gradient(135deg, #e94560, #b52a40); color: white; }
  </style>
</head>
<body>

  <!-- P2 zone (rotated 180°): btn-row last child → physical top edge -->
  <div class="zone" id="zone-p2">
    <div class="zone-inner">
      <button class="adj" onclick="adj(1,-1)">−</button>
      <div class="zone-center">
        <div class="turn-count" id="turn-p2">Turn 0</div>
        <div class="life-num-wrap">
          <div class="life-popup" id="popup-p2"></div>
          <div class="life-num" id="life-p2">20</div>
        </div>
        <div class="clock" id="clock-p2">5:00</div>
      </div>
      <button class="adj" onclick="adj(1,+1)">+</button>
    </div>
    <div class="btn-row">
      <button class="pass-btn start" id="pass-btn-p2" onclick="onPass(1)">Start Game</button>
      <button class="cast-btn hidden" id="cast-btn-p2" onclick="onCast(1)">Cast</button>
      <button class="f6-btn hidden"   id="f6-p2"       onclick="onF6(1)">F6</button>
    </div>
  </div>

  <!-- Middle ribbon -->
  <div class="mid">
    <div class="phase-track" id="phase-track"></div>
    <div class="mid-ctrls">
      <span class="stack-ind" id="stack-ind"></span>
      <button class="ctrl-btn" id="pause-btn"    onclick="togglePause()">⏸</button>
      <button class="ctrl-btn" id="reset-btn"    onclick="resetGame()">↺</button>
      <button class="ctrl-btn" id="settings-btn" onclick="openSettings()">⚙</button>
    </div>
  </div>

  <!-- P1 zone: btn-row last → physical bottom edge -->
  <div class="zone" id="zone-p1">
    <div class="zone-inner">
      <button class="adj" onclick="adj(0,-1)">−</button>
      <div class="zone-center">
        <div class="turn-count" id="turn-p1">Turn 0</div>
        <div class="life-num-wrap">
          <div class="life-popup" id="popup-p1"></div>
          <div class="life-num" id="life-p1">20</div>
        </div>
        <div class="clock" id="clock-p1">5:00</div>
      </div>
      <button class="adj" onclick="adj(0,+1)">+</button>
    </div>
    <div class="btn-row">
      <button class="pass-btn start" id="pass-btn-p1" onclick="onPass(0)">Start Game</button>
      <button class="cast-btn hidden" id="cast-btn-p1" onclick="onCast(0)">Cast</button>
      <button class="f6-btn hidden"   id="f6-p1"       onclick="onF6(0)">F6</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="overlay" id="settings-ov" onclick="bgClose(event,'settings-ov')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">⚙ Settings</div>
      <div class="row2">
        <div class="grp">
          <div class="grp-lbl">Starting Life</div>
          <div class="chips">
            <button class="chip on"   data-life="20" onclick="pickLife(20,this)">20</button>
            <button class="chip"      data-life="40" onclick="pickLife(40,this)">40</button>
            <button class="chip wide" data-life="0"  onclick="pickLife(0,this)">Custom</button>
          </div>
          <input id="inp-life" class="custom-inp" type="number" min="1" max="999" placeholder="e.g. 25">
        </div>
        <div class="grp">
          <div class="grp-lbl">Time Per Player</div>
          <div class="chips">
            <button class="chip on"   data-min="5"  onclick="pickTime(5,this)">5m</button>
            <button class="chip"      data-min="10" onclick="pickTime(10,this)">10m</button>
            <button class="chip wide" data-min="0"  onclick="pickTime(0,this)">Custom</button>
          </div>
          <input id="inp-time" class="custom-inp" type="number" min="1" max="120" placeholder="Minutes">
        </div>
      </div>
      <button class="btn-primary" onclick="applySettings()">Apply &amp; Reset Game</button>
      <button class="btn-ghost"   onclick="closeSettings()">Cancel</button>
    </div>
  </div>

  <!-- Combat -->
  <div class="overlay" id="combat-ov">
    <div class="modal">
      <div class="combat-row">
        <button class="combat-y" onclick="resolveCombat(true)">Yes</button>
        <div class="combat-mid">
          <div class="combat-title">⚔ Entering Combat</div>
          <div class="combat-q">Will attackers be declared?</div>
        </div>
        <button class="combat-n" onclick="resolveCombat(false)">No</button>
      </div>
    </div>
  </div>

  <script>
    // Internal phase ids (combat sub-steps inserted dynamically)
    const BASE  = ["Untap / Upkeep / Draw","First Main","Combat","Second Main","End Step"];
    const SHORT = {
      "Untap / Upkeep / Draw": "Upkeep",
      "First Main":            "Main 1",
      "Combat":                "Combat",
      "Declare Attackers":     "ATK",
      "Declare Blockers":      "BLK",
      "Damage":                "DMG",
      "Second Main":           "Main 2",
      "End Step":              "End",
    };
    const COMBAT_SUB = ["Declare Attackers","Declare Blockers","Damage"];
    const BREATHE_MS = 120_000;  // ≤ 2:00 → breathing
    const WARN_MS    = 60_000;   // ≤ 1:00 → solid red
    const CRIT_MS    = 30_000;   // ≤ 0:30 → blink
    const AUTO_MS    = 220;

    let cfg = { life: 20, secs: 300 };
    let pl  = [{ life:20, ms:300_000 }, { life:20, ms:300_000 }];

    let active     = -1;       // who holds priority (clock runs for them); -1 = none
    let started    = false;
    let paused     = false;
    let raf        = null;
    let lastT      = null;
    let turnPlayer = 0;        // whose turn it is
    let turnCount  = [0, 0];   // per-player turn number (increments when it becomes their turn)
    let passes     = 0;        // consecutive priority passes since last cast / resolve / step change
    let stack      = 0;        // items currently on the stack
    let autoPass   = [false,false]; // F6 auto-pass per player
    let phases     = [...BASE];
    let phaseIdx   = 0;
    let pLife = 20, pMin = 5;
    let shownLife  = [20, 20];   // displayed life (lags behind until damage commits)
    let lastMin    = [5, 5];     // last whole-minute value seen per clock (for minute flash)
    let _phaseSig  = '';         // dirty-check so the phase track only rebuilds on change

    const dead = () => pl[0].life === 0 || pl[1].life === 0;
    const inDamage = () => started && phases[phaseIdx] === 'Damage';

    // ── Clock ─────────────────────────────────────────
    function tick(now) {
      if (active < 0 || paused) return;
      if (lastT !== null) {
        pl[active].ms = Math.max(0, pl[active].ms - (now - lastT));
        renderClocks();
        if (pl[active].ms === 0) { haltClock(); renderAll(); return; }
      }
      lastT = now;
      raf = requestAnimationFrame(tick);
    }
    function haltClock() {
      if (raf) cancelAnimationFrame(raf);
      raf = null; lastT = null; active = -1;
    }

    // Hand priority (and the running clock) to a player.
    function setPriority(idx) {
      if (raf) cancelAnimationFrame(raf);
      active = idx; lastT = null;
      if (started && !paused) raf = requestAnimationFrame(tick);
      renderAll();
      // F6 auto-pass: if this player has flagged "no interaction", pass for them.
      if (started && !paused && autoPass[idx]) {
        setTimeout(() => {
          if (started && !paused && active === idx && autoPass[idx]) doPass(idx);
        }, AUTO_MS);
      }
    }

    // ── Pause ─────────────────────────────────────────
    function togglePause() {
      if (!started) return;
      paused = !paused;
      if (paused) { if (raf) { cancelAnimationFrame(raf); raf = null; } }
      else        { if (active >= 0) { lastT = null; raf = requestAnimationFrame(tick); } }
      renderAll();
    }

    // ── Priority actions ──────────────────────────────
    function onPass(idx) {
      if (paused || dead()) return;
      if (!started) { startGame(idx); return; }
      if (inDamage()) { if (idx === turnPlayer) advanceStep(); return; }  // turn player ends the frozen damage step
      doPass(idx);
    }
    function startGame(idx) {
      started = true; turnPlayer = idx;
      passes = 0; stack = 0; phases = [...BASE]; phaseIdx = 0;
      autoPass = [false,false];
      turnCount = [0, 0]; turnCount[idx] = 1;   // starter begins their turn 1
      setPriority(idx);
    }
    function doPass(idx) {
      if (!started || paused || dead()) return;
      if (active !== idx) return;       // only the priority holder can pass
      passes++;
      if (passes >= 2) {                // both players passed in succession
        passes = 0;
        if (stack > 0) { stack--; setPriority(turnPlayer); }  // resolve top of stack
        else           { advanceStep(); }                      // empty stack → next step
      } else {
        setPriority(1 - idx);           // hand priority to opponent
      }
    }
    // "Someone plays a card" → puts it on the stack; caster keeps priority.
    function onCast(idx) {
      if (!started || paused || dead()) return;
      if (inDamage()) return;
      if (active !== idx) return;
      stack++;
      passes = 0;
      autoPass[idx] = false;            // they're interacting, clear any auto-pass
      setPriority(idx);                 // caster retains priority
    }
    // F6 — toggle "no interaction / auto-pass". Both players on → jump to next turn.
    function onF6(idx) {
      if (!started || paused || dead()) return;
      if (inDamage()) return;
      autoPass[idx] = !autoPass[idx];
      if (autoPass[0] && autoPass[1]) { autoPass = [false,false]; newTurn(); return; }
      if (autoPass[idx] && active === idx) { doPass(idx); return; }
      renderAll();
    }

    // ── Turn / step flow ──────────────────────────────
    function advanceStep() {
      stack = 0; passes = 0;
      if (phaseIdx >= phases.length - 1) { newTurn(); return; }
      const next = phases[phaseIdx + 1];
      phaseIdx++;
      renderPhase();
      if      (next === 'Combat') openCombat();
      else if (next === 'Damage') { haltClock(); renderAll(); }   // freeze clock for damage
      else                        setPriority(turnPlayer);
    }
    function newTurn() {
      turnPlayer = 1 - turnPlayer;
      turnCount[turnPlayer]++;                  // it's now this player's next turn
      autoPass = [false,false];
      stack = 0; passes = 0;
      phases = [...BASE]; phaseIdx = 0;
      renderPhase();
      if (started) setPriority(turnPlayer);
      else         renderAll();
    }
    function goToPhase(i) {
      if (i < 0 || i >= phases.length) return;
      phaseIdx = i; stack = 0; passes = 0;
      renderPhase();
      if (!started) { renderAll(); return; }
      if (phases[i] === 'Damage') { haltClock(); renderAll(); }   // frozen during damage
      else                        setPriority(turnPlayer);
    }

    function openCombat() {
      haltClock();
      phases   = phases.filter(p => !COMBAT_SUB.includes(p));
      phaseIdx = phases.indexOf('Combat');
      renderPhase();
      renderOrientation();
      // Turn player has F6 (auto-pass) on → assume no attackers, skip the prompt.
      if (autoPass[turnPlayer]) {
        passes = 0; stack = 0;
        setPriority(turnPlayer);
        return;
      }
      document.getElementById('combat-ov').classList.add('open');
    }
    function resolveCombat(attackers) {
      document.getElementById('combat-ov').classList.remove('open');
      if (attackers) {
        const ci = phases.indexOf('Combat');
        phases.splice(ci + 1, 0, ...COMBAT_SUB);
      }
      // Begin at the Combat step itself, so beginning-of-combat triggers get a
      // priority window before advancing to Declare Attackers.
      phaseIdx = phases.indexOf('Combat');
      passes = 0; stack = 0;
      renderPhase();
      if (started) setPriority(turnPlayer);
    }

    // ── Life ──────────────────────────────────────────
    let lifeDelta    = [0, 0];
    let deltaTimeout = [null, null];

    function adj(idx, d) {
      const before = pl[idx].life;
      pl[idx].life  = Math.max(0, pl[idx].life + d);
      const actual  = pl[idx].life - before;
      // The big number stays put; only the delta popup moves while damage accumulates.
      if (actual !== 0) { lifeDelta[idx] += actual; showDeltaPopup(idx); }
      if (pl[idx].life === 0) {
        commitLife(idx); haltClock(); paused = false; renderAll();
      } else if (started && active < 0 && !dead() && pl[0].ms > 0 && pl[1].ms > 0) {
        // A player was tapped to 0 (halting the game) and then brought back — resume play.
        setPriority(turnPlayer);
      }
    }
    // Push the accumulated delta into the displayed number, with a shake.
    function commitLife(idx) {
      if (deltaTimeout[idx]) { clearTimeout(deltaTimeout[idx]); deltaTimeout[idx] = null; }
      const gained = pl[idx].life - shownLife[idx];
      shownLife[idx] = pl[idx].life;
      const num = document.getElementById(`life-p${idx + 1}`);
      num.textContent = shownLife[idx];
      num.classList.remove('shake', 'dmg', 'heal');
      void num.offsetWidth;                                  // restart the animation
      if (gained !== 0) num.classList.add('shake', gained < 0 ? 'dmg' : 'heal');
      setTimeout(() => num.classList.remove('shake', 'dmg', 'heal'), 520);
      document.getElementById(`popup-p${idx + 1}`).classList.remove('show');
      lifeDelta[idx] = 0;
    }
    function showDeltaPopup(idx) {
      const el = document.getElementById(`popup-p${idx + 1}`);
      const v  = lifeDelta[idx];
      el.textContent = v > 0 ? `+${v}` : `${v}`;
      el.className   = 'life-popup show';
      const ratio = Math.min(Math.abs(v), 20) / 20;       // saturate by 20 in one popup
      const ch    = Math.round(255 * (1 - ratio));        // white → full color
      const color = v > 0 ? `rgb(${ch},255,${ch})`        // gain → green
                  : v < 0 ? `rgb(255,${ch},${ch})`        // loss → red
                  : '#888';
      el.style.color = color; el.style.borderColor = color;
      if (deltaTimeout[idx]) clearTimeout(deltaTimeout[idx]);
      deltaTimeout[idx] = setTimeout(() => commitLife(idx), 2000);
    }

    // ── Settings ──────────────────────────────────────
    function openSettings()  { document.getElementById('settings-ov').classList.add('open'); }
    function closeSettings() { document.getElementById('settings-ov').classList.remove('open'); }
    function bgClose(e, id)  { if (e.target === document.getElementById(id)) closeSettings(); }
    function pickLife(val, btn) {
      document.querySelectorAll('[data-life]').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('inp-life').style.display = val === 0 ? 'block' : 'none';
      pLife = val;
    }
    function pickTime(val, btn) {
      document.querySelectorAll('[data-min]').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('inp-time').style.display = val === 0 ? 'block' : 'none';
      pMin = val;
    }
    function applySettings() {
      const life = pLife || (parseInt(document.getElementById('inp-life').value) || 20);
      const mins = pMin  || (parseInt(document.getElementById('inp-time').value) || 5);
      cfg.life = Math.max(1, life); cfg.secs = Math.max(60, mins * 60);
      resetGame(); closeSettings();
    }
    function resetGame() {
      haltClock();
      started = false; paused = false; active = -1;
      turnPlayer = 0; passes = 0; stack = 0; autoPass = [false,false]; turnCount = [0, 0]; _lastFlip = false;
      pl = [{life:cfg.life, ms:cfg.secs*1000}, {life:cfg.life, ms:cfg.secs*1000}];
      phases = [...BASE]; phaseIdx = 0; _phaseSig = '';
      lifeDelta = [0,0];
      shownLife = [cfg.life, cfg.life];
      lastMin   = [Math.ceil(cfg.secs/60), Math.ceil(cfg.secs/60)];
      deltaTimeout.forEach(t => { if (t) clearTimeout(t); });
      deltaTimeout = [null,null];
      document.querySelectorAll('.life-popup').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('.life-num').forEach(el => el.classList.remove('shake','dmg','heal'));
      renderAll();
    }

    // ── Render ────────────────────────────────────────
    function fmt(ms) {
      const s = Math.max(0, Math.ceil(ms / 1000));
      return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }
    function renderLife() {
      document.getElementById('life-p1').textContent = shownLife[0];
      document.getElementById('life-p2').textContent = shownLife[1];
    }
    function renderTurns() {
      document.getElementById('turn-p1').textContent = 'Turn ' + turnCount[0];
      document.getElementById('turn-p2').textContent = 'Turn ' + turnCount[1];
    }
    // Ribbon + combat box face the turn player (P2 → rotate 180°). Tied to turnPlayer,
    // not active, so it never flips when priority is merely passed.
    let _lastFlip = false;
    function renderOrientation() {
      const flip = turnPlayer === 1;
      document.getElementById('combat-ov').classList.toggle('flip', flip);
      const mid = document.querySelector('.mid');
      if (flip !== _lastFlip) {                 // turn changed → quick fade, no visible spin
        _lastFlip = flip;
        mid.style.opacity = '0';
        setTimeout(() => { mid.classList.toggle('flip', flip); mid.style.opacity = '1'; }, 150);
      } else {
        mid.classList.toggle('flip', flip);
        mid.style.opacity = '1';
      }
    }
    function renderClocks() {
      for (const [i, id] of [[0,'clock-p1'],[1,'clock-p2']]) {
        const el = document.getElementById(id);
        const ms = pl[i].ms;
        if (started && ms === 0) { el.textContent = 'TIME EXPIRED'; el.classList.add('expired'); }
        else                     { el.textContent = fmt(ms);        el.classList.remove('expired'); }

        // Pressure escalation applies only to the live (active, running) clock.
        el.classList.remove('breathing', 'warn', 'critical');
        const live = started && !paused && active === i && ms > 0;
        if (live) {
          if      (ms <= CRIT_MS)    el.classList.add('critical');
          else if (ms <= WARN_MS)    el.classList.add('warn');
          else if (ms <= BREATHE_MS) el.classList.add('breathing');
        }
        // Quick red flash each time a whole minute ticks over (above the 1-min mark).
        // ceil → fires AT the minute mark (4:00, 3:00…), not a second after, and no flash at start.
        const cur = Math.ceil(ms / 60000);
        if (live && cur < lastMin[i] && ms > WARN_MS) {
          el.classList.add('flash');
          setTimeout(() => el.classList.remove('flash'), 650);
        }
        lastMin[i] = cur;
      }
    }
    function renderPhase() {
      const track = document.getElementById('phase-track');
      const arrSig = phases.join('|');
      if (arrSig !== _phaseSig) {               // rebuild tiles only when the phase list changes
        _phaseSig = arrSig;
        track.innerHTML = '';
        const slider = document.createElement('div');
        slider.className = 'phase-slider';
        slider.id = 'phase-slider';
        track.appendChild(slider);
        phases.forEach((p, i) => {
          const b = document.createElement('button');
          b.className = 'phase-seg';
          b.textContent = SHORT[p] || p;
          b.onclick = () => goToPhase(i);
          track.appendChild(b);
        });
      }
      const segs = track.querySelectorAll('.phase-seg');
      segs.forEach((s, i) => {
        s.classList.toggle('on',   i === phaseIdx);
        s.classList.toggle('done', i < phaseIdx);
      });
      const cur = segs[phaseIdx];
      const slider = document.getElementById('phase-slider');
      if (cur && slider) {                      // slide the gold highlight to the active phase
        slider.style.left  = cur.offsetLeft + 'px';
        slider.style.width = cur.offsetWidth + 'px';
      }
      renderStack();
    }
    function renderStack() {
      const si = document.getElementById('stack-ind');
      si.textContent = `⛁ ${stack}`;
      si.classList.toggle('show', stack > 0);
    }
    function renderButtons() {
      for (const i of [0, 1]) {
        const pass = document.getElementById(`pass-btn-p${i+1}`);
        const cast = document.getElementById(`cast-btn-p${i+1}`);
        const f6   = document.getElementById(`f6-p${i+1}`);

        if (!started) {
          pass.textContent = 'Start Game'; pass.className = 'pass-btn start';
          cast.classList.add('hidden'); f6.classList.add('hidden');
          continue;
        }
        cast.classList.remove('hidden'); f6.classList.remove('hidden');

        if (inDamage()) {                          // clock frozen; turn player ends the step
          if (i === turnPlayer) { pass.className = 'pass-btn';         pass.textContent = 'Damage Assigned →'; }
          else                  { pass.className = 'pass-btn waiting'; pass.textContent = 'Waiting…'; }
          cast.className = 'cast-btn waiting';
          f6.className   = 'f6-btn';
          continue;
        }

        const hold = active === i && !paused;
        if (hold) {
          pass.className = 'pass-btn';
          pass.textContent = passes >= 1
            ? (stack > 0 ? 'Pass → Resolve' : 'Pass → Next Step')
            : 'Pass Priority';
          cast.className = 'cast-btn';
        } else {
          pass.className = 'pass-btn waiting'; pass.textContent = 'Waiting…';
          cast.className = 'cast-btn waiting';
        }
        f6.className = 'f6-btn' + (autoPass[i] ? ' on' : '');
      }
    }
    function renderActive() {
      for (const [i, id] of [[0,'zone-p1'],[1,'zone-p2']]) {
        const el = document.getElementById(id);
        el.classList.toggle('active', active === i && !paused);
        el.classList.toggle('dead',   pl[i].life === 0);
      }
      renderButtons();
    }
    function renderPauseBtn() {
      const b = document.getElementById('pause-btn');
      b.textContent = paused ? '▶' : '⏸';
      b.classList.toggle('paused', paused);
    }
    function renderAll() {
      renderLife(); renderTurns(); renderClocks(); renderPhase(); renderActive(); renderPauseBtn(); renderOrientation();
    }

    // ── Wake Lock ─────────────────────────────────────
    let wakeLockSentinel = null;
    async function acquireWakeLock() {
      try { if ('wakeLock' in navigator) wakeLockSentinel = await navigator.wakeLock.request('screen'); }
      catch(_) {}
    }
    acquireWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') acquireWakeLock();
    });

    // Best-effort landscape lock (works in installed PWA)
    try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); } catch(_) {}

    // ── Service Worker ────────────────────────────────
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    renderAll();
  </script>
</body>
</html>
